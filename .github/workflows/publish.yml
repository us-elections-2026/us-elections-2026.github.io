name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 실행 + Mac mini가 repository_dispatch로 트리거 가능

permissions:
  contents: write   # gh-pages 브랜치 push 용

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # RSPM 바이너리 인덱스가 일시 불통이면 R이 소스 컴파일로 폴백한다.
      # 그때 curl/xml2/systemfonts 등이 빌드되도록 시스템 개발 헤더를 미리 깐다.
      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libpng-dev \
            libtiff5-dev libjpeg-dev

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c("jsonlite", "dplyr", "gt", "readr"))

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
