project:
  type: website
  execute-dir: project
  output-dir: _site
  resources:
    - data/model_dashboard.json
    - data/trends.json
    - assets/candidates

lang: ko

website:
  title: "미국 중간선거 한국어 브리핑"
  description: "2026 미국 중간선거를 데이터와 해석으로 — 한국 독자를 위한 주간 브리핑"
  site-url: "https://us-elections-2026.github.io"
  navbar:
    left:
      - href: index.qmd
        text: 홈
      - href: about.qmd
        text: 소개
    right:
      - icon: github
        href: https://github.com/us-elections-2026/us-elections-2026.github.io
  sidebar:
    style: docked
    collapse-level: 1
    contents:
      - section: "Overview"
        contents:
          - text: "홈 — 환경 스냅샷"
            href: index.qmd
          - text: "전망 대시보드"
            href: dashboard.qmd
          - text: "트래커 (전체 표)"
            href: trackers.qmd
          - text: "상원 경합주 표"
            href: senate.qmd
          - text: "소개"
            href: about.qmd
      - section: "Weekly Report"
        contents:
          - auto: "issues/*.qmd"
      - section: "State Focus"
        contents:
          - states/ga.qmd
          - states/mi.qmd
          - states/me.qmd
          - states/nc.qmd
          - states/tx.qmd
          - states/oh.qmd
          - states/ak.qmd
  page-footer:
    center: "데이터 기준 시각은 각 표 상단에 표기됩니다. · 예측시장 가격은 확률의 근사일 뿐입니다."

format:
  html:
    theme:
      - litera
      - theme/custom.scss
    toc: true
    toc-title: 목차
    code-tools: false
    smooth-scroll: true

execute:
  echo: false
  warning: false
  message: false
  freeze: false   # 데이터가 바뀌면 매 빌드 다시 실행 (트래커 신선도 보장)
